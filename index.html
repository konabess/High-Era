<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Era Roleplay</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #FFD700;
      --border: rgba(255,215,0,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #111, #000);
      color: white;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      width: 100%;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 25px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 35px;
    }

    .logo span {
      color: var(--gold);
      font-weight: 600;
    }

    /* RIGHT SIDE NAV */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* PLAY NOW BUTTON */
    .play-btn {
      background: var(--gold);
      color: black;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px var(--gold);
    }

    /* HAMBURGER */
    .menu-btn {
      font-size: 26px;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu-btn:hover {
      color: var(--gold);
    }

    /* FULLSCREEN DROPDOWN */
    .dropdown {
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100vh;

      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(25px);

      padding: 100px 30px 30px;
      transition: 0.5s ease;
      z-index: 999;
    }

    .dropdown.active {
      top: 0;
    }

    /* MENU ITEM */
    .dropdown a {
      display: block;
      margin: 18px 0;
      font-size: 22px;
      text-decoration: none;
      color: white;
      padding: 12px 15px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .dropdown a:hover {
      color: var(--gold);
      transform: translateX(8px);
      background: rgba(255, 215, 0, 0.08);
      box-shadow: 0 0 15px rgba(255,215,0,0.2);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 42px;
    }

    .hero span {
      color: var(--gold);
    }

    .hero p {
      color: #aaa;
      margin-top: 10px;
    }

    /* DISCORD BUTTON */
    .discord-btn {
      margin-top: 25px;
      background: var(--gold);
      color: black;
      padding: 14px 30px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .discord-btn:hover {
      box-shadow: 0 0 25px var(--gold);
      transform: translateY(-2px);
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <nav>
    <div class="logo">
      <img src="https://i.ibb.co.com/DDvpVhfy/IMG-20260504-WA0072.jpg">
      <span>High Era RP</span>
    </div>

<div class="nav-right">
  <a href="#" class="play-btn">Play Now</a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

  </nav>

  <!-- FULLSCREEN MENU -->

  <div class="dropdown" id="dropdown">
    <a href="#">Beranda</a>
    <a href="#">Pekerjaan</a>
    <a href="#">Peraturan</a>
    <a href="#">Donasi</a>
    <a href="#">Merch</a>
  </div>

  <!-- HERO -->

  <section class="hero">
    <h1>Welcome to <span>High Era Roleplay</span></h1>
    <p>Server GTA V Roleplay dengan pengalaman realistis & komunitas aktif</p>

<a href="https://discord.gg/yourlink" class="discord-btn">Join Discord</a>

  </section>

  <script>
    function toggleMenu() {
      document.getElementById("dropdown").classList.toggle("active");
    }
  </script>

</body>
</html>
